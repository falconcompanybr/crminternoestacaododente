<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Estação do Dente · CRM</title>
<style>
  :root{
    --bg:#f1f5f9;--surface:#fff;--ink:#16306e;--muted:#64748b;--faint:#94a3b8;--line:#e2e8f0;
    --teal:#0e88d6;--teal-d:#0566ad;--teal-l:#d8edfb;--emerald:#059669;--rose:#e11d48;--amber:#d97706;
    --gold:#d4a017;--sky:#0284c7;--indigo:#4f46e5;--violet:#7c3aed;--orange:#ea580c;--red:#dc2626;
    --slate9:#0c2050;--radius:12px;--shadow:0 1px 2px rgba(15,23,42,.06),0 4px 16px rgba(15,23,42,.05);
  }
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit;font-size:14px}
  a{color:var(--teal-d)}::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}
  .app{display:flex;min-height:100vh}
  .side{width:224px;flex:0 0 224px;background:var(--slate9);color:#cbd5e1;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;padding:12px;border-bottom:1px solid #16306e}
  .brand .logo{height:32px;width:32px;border-radius:9px;background:var(--teal);display:grid;place-items:center;color:#fff}
  .brand b{color:#fff;font-weight:600}.brand b span{color:#8cc8f4}
  nav{flex:1;padding:10px;overflow-y:auto}
  .navbtn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 11px;border:0;background:transparent;color:#cbd5e1;border-radius:9px;font-size:14px;text-align:left;margin-bottom:2px}
  .navbtn:hover{background:#16306e}.navbtn.active{background:var(--teal);color:#fff}.navbtn svg{flex:0 0 18px}
  .me{padding:10px;border-top:1px solid #16306e;display:flex;align-items:center;gap:8px}
  .me .info{flex:1;min-width:0}.me .info p{margin:0;font-size:13px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.me .info small{color:#64748b}
  .iconbtn{background:transparent;border:0;color:#94a3b8;display:grid;place-items:center;padding:4px;border-radius:7px}.iconbtn:hover{color:#fff;background:#16306e}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:20}
  .crumb{color:var(--muted);font-size:13px}.crumb b{color:var(--ink)}
  .content{padding:22px;max-width:1180px;width:100%}
  .row{display:flex;align-items:center;gap:10px}.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .grid{display:grid;gap:12px}.h2{font-size:18px;font-weight:600;margin:0}.sub{color:var(--muted);font-size:13px;margin:2px 0 0}
  .muted{color:var(--muted)}.faint{color:var(--faint)}.mt{margin-top:16px}.mb{margin-bottom:14px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)}.pad{padding:16px}
  .sep{height:1px;background:var(--line);margin:12px 0}.right{text-align:right}.center{text-align:center}
  .label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
  .uppr{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint)}
  .input,select.input,textarea.input{width:100%;border:1px solid #cbd5e1;border-radius:9px;padding:8px 11px;outline:none;background:#fff;color:var(--ink)}
  .input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.15)}textarea.input{resize:vertical;min-height:64px}
  .btn{border:1px solid #cbd5e1;background:#fff;color:#334155;border-radius:9px;padding:8px 13px;font-size:14px;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{background:#f8fafc}.btn-primary{background:var(--teal-d);border-color:var(--teal-d);color:#fff}.btn-primary:hover{background:#115e56}
  .btn-emerald{background:var(--emerald);border-color:var(--emerald);color:#fff}.btn-danger{background:#fff;border-color:#fecdd3;color:var(--rose)}.btn-danger:hover{background:#fff1f2}
  .btn-ghost{border-color:transparent;background:transparent;color:var(--muted)}.btn-ghost:hover{background:#f1f5f9}
  .btn-sm{padding:5px 10px;font-size:13px}.btn-block{width:100%;justify-content:center}.btn:disabled{opacity:.5;cursor:not-allowed}
  .badge{display:inline-flex;align-items:center;gap:5px;border:1px solid;border-radius:999px;padding:2px 9px;font-size:12px;font-weight:500;white-space:nowrap}
  .t-slate{background:#f1f5f9;color:#475569;border-color:#e2e8f0}.t-sky{background:#e0f2fe;color:#0369a1;border-color:#bae6fd}
  .t-indigo{background:#e0e7ff;color:#4338ca;border-color:#c7d2fe}.t-violet{background:#ede9fe;color:#6d28d9;border-color:#ddd6fe}
  .t-emerald{background:#d1fae5;color:#047857;border-color:#a7f3d0}.t-amber{background:#fef3c7;color:#b45309;border-color:#fde68a}
  .t-orange{background:#ffedd5;color:#c2410c;border-color:#fed7aa}.t-rose{background:#ffe4e6;color:#be123c;border-color:#fecdd3}
  .t-red{background:#fee2e2;color:#b91c1c;border-color:#fecaca}
  .dot{height:8px;width:8px;border-radius:999px;display:inline-block}
  .d-slate{background:#94a3b8}.d-sky{background:#0ea5e9}.d-indigo{background:#6366f1}.d-violet{background:#8b5cf6}
  .d-emerald{background:#10b981}.d-amber{background:#f59e0b}.d-orange{background:#f97316}.d-rose{background:#f43f5e}.d-red{background:#ef4444}
  .av{height:34px;width:34px;flex:0 0 34px;border-radius:999px;background:var(--teal-d);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:600}
  .av.sm{height:30px;width:30px;flex-basis:30px}.av.lg{height:42px;width:42px;flex-basis:42px;font-size:14px}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.03em;padding:10px 14px;background:#f8fafc;border-bottom:1px solid var(--line)}
  tbody td{padding:11px 14px;border-bottom:1px solid #f1f5f9}tbody tr:last-child td{border-bottom:0}tbody tr.clk:hover{background:#f8fafc;cursor:pointer}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
  .kpi .k{font-size:12px;color:var(--muted)}.kpi .v{font-size:20px;font-weight:600;margin-top:3px}.kpi .s{font-size:12px;color:var(--faint);margin-top:1px}
  .board{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px}
  .col{width:248px;flex:0 0 248px}.col h4{margin:0 0 2px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;justify-content:space-between}
  .col h4 .cnt{color:var(--faint);font-weight:500}.col .sum{font-size:12px;color:var(--faint);margin:0 0 8px}
  .drop{min-height:50px;display:flex;flex-direction:column;gap:8px;border-radius:10px;padding:2px;transition:background .12s}
  .drop.over{background:#e2f3f1;outline:2px dashed var(--teal)}
  .lead{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px;cursor:grab}
  .lead:hover{border-color:var(--teal);box-shadow:var(--shadow)}.lead .nm{font-weight:600;font-size:14px;line-height:1.2}
  .lead .meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid #f1f5f9;font-size:12px;color:var(--faint)}
  .scrim{position:fixed;inset:0;background:rgba(15,23,42,.42);backdrop-filter:blur(2px);z-index:40;display:flex;justify-content:flex-end}
  .scrim.center{align-items:center;justify-content:center;padding:16px}
  .drawer{width:460px;max-width:100%;background:#fff;height:100%;overflow-y:auto;box-shadow:-8px 0 30px rgba(0,0,0,.12)}
  .dhead{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:14px 18px;z-index:2}
  .dtabs{display:flex;gap:18px;padding:0 18px;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:64px;z-index:2}
  .dtab{border:0;background:transparent;padding:11px 0;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
  .dtab.active{color:var(--teal-d);border-bottom-color:var(--teal-d);font-weight:600}
  .modal{width:520px;max-width:100%;background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden}.modal.sm{width:400px}
  .mhead{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line)}.mhead h3{margin:0;font-size:16px}
  .mbody{padding:18px}.mfoot{display:flex;justify-content:flex-end;gap:8px;padding:14px 18px;border-top:1px solid var(--line)}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.field{margin-bottom:12px}
  .tl{list-style:none;margin:0;padding:0 0 0 18px;border-left:2px solid var(--line)}
  .tl li{position:relative;margin-bottom:14px}.tl li .pin{position:absolute;left:-25px;top:1px;height:14px;width:14px;border-radius:999px;background:var(--teal);border:2px solid #fff}
  .tl li p{margin:0;font-size:13px}.tl li small{color:var(--faint);font-size:11px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{display:inline-flex;align-items:center;gap:5px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:999px;padding:3px 9px;font-size:12px}
  .chip button{border:0;background:transparent;color:var(--faint);display:grid;place-items:center;padding:0}.chip button:hover{color:var(--rose)}
  .empty{padding:40px 16px;text-align:center;color:var(--faint)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px}
  .sync-saved{color:#047857;background:#d1fae5}.sync-saving{color:#b45309;background:#fef3c7}.sync-offline{color:#475569;background:#f1f5f9}.sync-error{color:#be123c;background:#ffe4e6}
  .tabs{display:flex;gap:4px;background:#f1f5f9;padding:4px;border-radius:10px;width:fit-content;margin-bottom:14px}
  .tab{border:0;background:transparent;padding:6px 14px;border-radius:7px;font-size:13px;color:var(--muted)}.tab.active{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .checkgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .checkrow{display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 8px;border:1px solid var(--line);border-radius:8px}
  .donut{height:150px;width:150px;border-radius:999px}.legend{display:flex;flex-direction:column;gap:6px;font-size:13px}.legend i{height:10px;width:10px;border-radius:3px;display:inline-block;margin-right:7px}
  .funbar{display:flex;align-items:center;gap:10px;margin-bottom:7px}.funbar .nm{width:120px;font-size:12px;color:var(--muted);text-align:right;flex:0 0 120px}
  .funbar .track{flex:1;background:#f1f5f9;border-radius:6px;height:22px;overflow:hidden}.funbar .fill{height:100%;background:var(--teal);border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;color:#fff;font-size:11px;font-weight:600;min-width:22px}
  /* ortho */
  .obar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 18px;border-bottom:1px solid var(--line)}
  .ostat{background:#f8fafc;border:1px solid var(--line);border-radius:9px;padding:8px 10px}.ostat .l{font-size:10px;color:var(--faint);text-transform:uppercase}.ostat .v{font-size:14px;font-weight:600;margin-top:2px}
  .alertbox{background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:11px 13px;font-size:13px;color:#92400e}
  .seg{display:flex;gap:6px}.segbtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 12px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .segbtn.on{border-color:var(--teal);background:var(--teal-l);color:var(--teal-d);font-weight:600}
  .benefit{border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:10px}
  .gold{background:linear-gradient(120deg,#d4a017,#b8860b);color:#fff;border:0}
  .selcard{border:1px solid var(--line);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;background:#fff}
  .selcard.on{border-color:var(--violet);background:#f5f3ff;color:#5b21b6}
  @media(max-width:820px){.side{display:none}.kpis{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.obar{grid-template-columns:repeat(2,1fr)}}
  .login{min-height:100vh;background:var(--slate9);display:grid;place-items:center;padding:16px}.login .box{width:360px;max-width:100%}
  .login .card2{background:#fff;border-radius:16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .login h1{color:#fff;text-align:center;font-size:24px;margin:10px 0 2px}.login h1 span{color:#8cc8f4}
  .login .lead2{color:#94a3b8;text-align:center;font-size:13px;margin:0 0 20px}.hint{font-size:12px;color:#94a3b8;text-align:center;margin-top:14px}
</style>
</head>

let fb=null,remoteApplying=false,saveTimer=null;

function setSync(kind){const saved=fb?["Nuvem · salvo","sync-saved"]:["Local · salvo","sync-offline"];const map={saved,saving:["Salvando…","sync-saving"],offline:[fb?"Sem conexão":"Local · salvo",fb?"sync-error":"sync-offline"],error:["Erro de sincronização","sync-error"]};const[t,c]=map[kind]||saved;const el=$("#sync");if(el){el.className="pill "+c;el.textContent=t;}}
function persist(){if(remoteApplying)return;setSync("saving");clearTimeout(saveTimer);saveTimer=setTimeout(async()=>{try{if(fb){await fb.setDoc(fb.ref,JSON.parse(JSON.stringify(state)));}else{saveLocal(state);}setSync(navigator.onLine?"saved":"offline");}catch(e){console.error(e);setSync("error");}},250);}

function dashboardView(){
  const pats=state.patients.filter(p=>inPeriod(p.createdAt)),fin=state.finance.filter(f=>inPeriod(f.date)),S=metaMes(new Date().toISOString().slice(0,7));
  const fechados=pats.filter(p=>p.stage==="fechou");

  const faturamento=closedP.reduce((s,p)=>s+(+p.closedValue||0),0);
  const leads=pats.length,agendados=pats.filter(p=>["agendado","compareceu","fechou","noshow"].includes(p.stage)).length;
  const compareceu=pats.filter(p=>["compareceu","fechou"].includes(p.stage)).length,noshow=pats.filter(p=>p.stage==="noshow").length,reativ=pats.filter(p=>p.stage==="reativacao").length;
  const invest=+S.investimento||fin.filter(f=>f.type==="out"&&/tráfego|trafego|ads/i.test(f.desc)).reduce((s,f)=>s+f.value,0);
  const roi=invest?((faturamento-invest)/invest*100):0,roas=invest?(faturamento/invest):0;
  const cpl=+S.custoLead||(leads?invest/leads:0),cpa=+S.custoAgendamento||(agendados?invest/agendados:0),cpv=+S.custoVenda||(closedP.length?invest/closedP.length:0);
  const fech=agendados?(fechados.length/agendados*100):0,comp=agendados?(compareceu/agendados*100):0;
  const meta=+S.metaFaturamento,metaPac=+S.metaPacientes,goalPct=meta?Math.min(100,faturamento/meta*100):0,pacPct=metaPac?Math.min(100,closedP.length/metaPac*100):0;
  const sm0=startOfMonth();const fechMes=state.patients.filter(p=>p.stage==="fechou"&&p.closedAt&&p.closedAt>=sm0);const realizadoMes=fechMes.reduce((s,p)=>s+(+p.closedValue||0),0);const metaFalta=meta-realizadoMes;const metaPctMes=meta?Math.min(100,realizadoMes/meta*100):0;const mesNome=new Date().toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
  const fStages=STAGES.filter(s=>!["reativacao","esfriou","perdido"].includes(s.id));

  const oc=ORIGINS.map(o=>({o,n:pats.filter(p=>p.origin===o).length})).filter(x=>x.n);const totalO=oc.reduce((s,x)=>s+x.n,0)||1;
  let acc=0;const segs=oc.map(x=>{const a=acc/totalO*360;acc+=x.n;return `${ORIGIN_COLORS[x.o]} ${a}deg ${acc/totalO*360}deg`;}).join(",");
  const donut=oc.length?`<div class="row" style="gap:22px"><div class="donut" style="background:conic-gradient(${segs});position:relative"><div style="position:absolute;inset:34px;background:#fff;border-radius:999px;display:grid;place-items:center"><b style="font-size:18px">${totalO}</b></div></div><div class="legend">${oc.map(x=>`<div><i style="background:${ORIGIN_COLORS[x.o]}"></i>${x.o} · ${x.n}</div>`).join("")}</div></div>`:`<div class="empty">Sem leads no período.</div>`;

  return `<div class="between mb"><div><h2 class="h2">Dashboard — Mentoria</h2><p class="sub">Filtrando por: <b>${periodLabel}</b></p></div><div class="row">${periodChips}${session.role==="Mentor"?`<button class="btn btn-sm" data-act="goals">${svg("gear",15)} Metas & custos</button>`:""}</div></div>
    <div class="card pad mb"><div class="uppr mb">Meta x realizado — <span style="text-transform:capitalize">${mesNome}</span></div>

    <div class="field"><label class="label">${svg("star",12)} Indicado por</label><input class="input" data-field="indicadoPor" value="${esc(p.indicadoPor||"")}" placeholder="Nome de quem indicou (se houver)"></div>

/* ---- ORTHOCLUB DRAWER (Ficha / Histórico) ---- */
function orthoDrawer(p){
  ensureClubParcelas(p);

    <div class="sep"></div>
    <div class="uppr mb">${svg("gift",13)} Tratamento</div>
    <div class="row mb" style="gap:8px"><button class="btn btn-sm" data-act="oc-aparelho" data-id="${p.id}">${c.aparelhoInstalado?"Aparelho instalado":"Aparelho não instalado"}</button><button class="btn btn-sm" data-act="oc-manut" data-id="${p.id}">${svg("plus",13)} Registrar manutenção</button></div>
    <div class="g2"><div class="field"><label class="label">Ortodontista</label><input class="input" data-field="club.ortodontista" value="${esc(c.ortodontista||"")}" placeholder="Dra. ..."></div><div><div class="uppr">Comparecimentos</div><div>${(c.manutencoes||[]).length} <span class="faint">automático</span></div></div></div>

    <div class="sep"></div>
    <div class="uppr mb">${svg("gift",13)} Benefícios</div>
    ${benefitCard(p,"limpeza","Limpeza","1 limpeza a cada 4 meses",lim)}
    ${benefitCard(p,"extracao","Extração","1 por mês",ext)}

const ostat=(l,v)=>`<div class="ostat"><div class="l">${l}</div><div class="v">${v}</div></div>`;
function benefitCard(p,key,title,sub,b){

/* ===== FINANCEIRO ===== */
/* ===== FINANCEIRO (contratos, parcelas, fluxo) ===== */
function addDays(iso,d){const x=new Date(iso);x.setDate(x.getDate()+d);return x.toISOString().slice(0,10);}
function startOfWeek(){const d=new Date();const D=(d.getDay()+6)%7;d.setDate(d.getDate()-D);return d.toISOString().slice(0,10);}
function startOfMonth(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1).toISOString().slice(0,10);}
function metaMes(ym){const m=(state.settings&&state.settings.metasMes)?state.settings.metasMes[ym]:null;return m||state.settings;}
function genInstallments(c){const list=[];const restante=Math.max(0,(+c.value||0)-(+c.entrada||0));const k=Math.max(1,+c.parcelas||1);const each=Math.round((restante/k)*100)/100;if(+c.entrada>0)list.push({id:uid(),n:"Entrada",value:+c.entrada,due:c.firstDue,status:"pendente",method:c.method,paidDate:null,baixaBy:null});for(let i=1;i<=k;i++)list.push({id:uid(),n:`${i}/${k}`,value:each,due:addMonths(c.firstDue,i-1),status:"pendente",method:c.method,paidDate:null,baixaBy:null});return list;}
function allInstallments(){const out=[];state.patients.forEach(p=>{if(p.contract&&p.contract.installments)p.contract.installments.forEach(i=>out.push(Object.assign({},i,{patient:p,pid:p.id})));});return out;}
function instStatus(i){if(i.status==="pago")return"pago";if(i.status==="cancelado")return"cancelado";return i.due<todayISO()?"atrasado":"a vencer";}
const SITTONE={pago:"emerald","a vencer":"sky",atrasado:"rose",cancelado:"slate",pendente:"amber"};

function financeView(){
  const canBaixa=["CEO","Financeiro"].includes(session.role);
  const tabs=`<div class="tabs">${[["visao","Visão"],["receber","A Receber"],["inadimplencia","Inadimplência"],["lancamentos","Lançamentos"]].map(([k,l])=>`<button class="tab ${finTab===k?'active':''}" data-act="fin-tab" data-id="${k}">${l}</button>`).join("")}</div>`;
  let body;
  if(finTab==="receber")body=finReceber(canBaixa);
  else if(finTab==="inadimplencia")body=finInadimplencia();
  else if(finTab==="lancamentos")body=finLancamentos();
  else body=finVisao();
  return `<div class="between mb"><div><h2 class="h2">Financeiro</h2><p class="sub">Contratos, contas a receber e fluxo de caixa</p></div>${finTab==="lancamentos"?`<button class="btn btn-primary" data-act="new-finance">${svg("plus",16)} Lançamento</button>`:""}</div>${tabs}${body}`;
}
function finVisao(){
  const insts=allInstallments();
  const closedAll=state.patients.filter(p=>p.stage==="fechou");
  const sw=startOfWeek(),sm=startOfMonth();
  const fat=iso=>closedAll.filter(p=>p.closedAt&&iso(p.closedAt)).reduce((s,p)=>s+(+p.closedValue||0),0);
  const fatDia=fat(d=>d===todayISO()),fatSem=fat(d=>d>=sw),fatMes=fat(d=>d>=sm);
  const recebido=insts.filter(i=>i.status==="pago").reduce((s,i)=>s+i.value,0);
  const aReceber=insts.filter(i=>instStatus(i)==="a vencer").reduce((s,i)=>s+i.value,0);
  const atraso=insts.filter(i=>instStatus(i)==="atrasado").reduce((s,i)=>s+i.value,0);
  const ticket=closedAll.length?closedAll.reduce((s,p)=>s+(+p.closedValue||0),0)/closedAll.length:0;
  const mrr=state.patients.filter(p=>p.club&&p.club.active&&p.club.status==="Ativo").reduce((s,p)=>s+(+p.club.mensalidade||0),0);
  const meta=+(metaMes(new Date().toISOString().slice(0,7)).metaFaturamento)||0,metaPct=meta?Math.min(100,fatMes/meta*100):0;
  const in30=addDays(todayISO(),30);
  const prox=insts.filter(i=>{const st=instStatus(i);return(st==="a vencer"||st==="atrasado")&&i.due<=in30;}).sort((a,b)=>a.due.localeCompare(b.due));
  const prox30=prox.reduce((s,i)=>s+i.value,0);
  const proxList=prox.slice(0,8).map(i=>`<div class="between" style="font-size:13px;padding:6px 0;border-bottom:1px solid #f1f5f9"><span>${fmtDate(i.due)} · ${esc(i.patient.name)} <span class="faint">${esc(i.n)}</span></span><b>${BRL(i.value)}</b></div>`).join("");
  return `<div class="kpis mb">${kpi("Faturamento (dia)",BRL(fatDia))}${kpi("Faturamento (semana)",BRL(fatSem))}${kpi("Faturamento (mês)",BRL(fatMes))}${kpi("Ticket médio",BRL(ticket),closedAll.length+" contratos")}</div>
    <div class="kpis mb">${kpi("Recebido",BRL(recebido))}${kpi("A receber",BRL(aReceber))}${kpi("Em atraso",BRL(atraso))}${kpi("Receita recorrente (MRR)",BRL(mrr),"ARR "+BRL(mrr*12))}</div>
    <div class="g2"><div class="card pad"><div class="uppr mb">Meta x realizado (mês)</div><div class="between" style="align-items:flex-end"><b style="font-size:22px">${BRL(fatMes)}</b><span class="muted" style="font-size:13px">Meta ${BRL(meta)} · ${metaPct.toFixed(0)}%</span></div><div style="height:10px;border-radius:999px;background:#f1f5f9;overflow:hidden;margin-top:10px"><div style="height:100%;background:var(--teal);width:${metaPct}%"></div></div></div>
    <div class="card pad"><div class="between mb"><div class="uppr">Fluxo previsto (30 dias)</div><b>${BRL(prox30)}</b></div>${proxList||'<div class="faint" style="font-size:13px">Sem vencimentos nos próximos 30 dias.</div>'}</div></div>`;
}
function finReceber(canBaixa){
  const insts=allInstallments().filter(i=>i.status!=="cancelado").sort((a,b)=>a.due.localeCompare(b.due));
  const rows=insts.map(i=>{const st=instStatus(i);return `<tr><td>${esc(i.patient.name)}</td><td class="muted">${esc(i.patient.treatment||"")}</td><td>${esc(i.n)}</td><td class="right" style="font-weight:600">${BRL(i.value)}</td><td>${fmtDate(i.due)}</td><td><span class="badge t-${SITTONE[st]}">${st}</span></td><td class="muted">${esc(i.method||"—")}</td><td class="right">${i.status==="pago"?`<span class="faint" style="font-size:12px">${fmtDate(i.paidDate)} · ${esc(i.baixaBy||"")}</span>`:(canBaixa?`<button class="btn btn-sm btn-emerald" data-act="baixa" data-id="${i.pid}" data-v="${i.id}">${svg("check",13)} Dar baixa</button>`:'<span class="faint" style="font-size:11px">—</span>')}</td></tr>`;}).join("");
  return `<div class="card"><table><thead><tr><th>Cliente</th><th>Serviço</th><th>Parcela</th><th class="right">Valor</th><th>Vencimento</th><th>Situação</th><th>Forma</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan="8"><div class="empty">Nenhuma parcela. Feche um contrato no Pipeline para gerar o parcelamento automaticamente.</div></td></tr>'}</tbody></table></div>`;
}
function finInadimplencia(){
  const map={};
  allInstallments().forEach(i=>{if(instStatus(i)==="atrasado"){const k=i.pid;map[k]=map[k]||{p:i.patient,valor:0,dias:0,items:0};map[k].valor+=i.value;map[k].items++;const d=Math.floor((Date.now()-new Date(i.due).getTime())/86400000);if(d>map[k].dias)map[k].dias=d;}});
  const rows=Object.values(map).map(x=>{const c=(x.p.contract&&x.p.contract.cobrancas)||[];const phone=(x.p.phone||"").replace(/\D/g,"");return `<tr><td>${esc(x.p.name)}</td><td class="right" style="color:var(--rose);font-weight:600">${BRL(x.valor)}</td><td>${x.dias} dias</td><td>${x.items} parc.</td><td>${c.length}</td><td class="muted">${c[0]?esc(c[0].at):"—"}</td><td class="right"><div class="row" style="gap:4px;justify-content:flex-end">${phone?`<a class="btn btn-sm" href="https://wa.me/55${phone}?text=${encodeURIComponent("Olá "+x.p.name+", consta um valor em aberto de "+BRL(x.valor)+". Podemos regularizar?")}" target="_blank" rel="noopener">WhatsApp</a>`:""}<button class="btn btn-sm" data-act="cobrar" data-id="${x.p.id}">Registrar cobrança</button></div></td></tr>`;}).join("");
  return `<div class="card"><table><thead><tr><th>Cliente</th><th class="right">Valor devido</th><th>Atraso</th><th>Parcelas</th><th>Cobranças</th><th>Último contato</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan="7"><div class="empty">Nenhum cliente em atraso.</div></td></tr>'}</tbody></table></div>`;
}
function finLancamentos(){
  const fin=state.finance,ent=fin.filter(x=>x.type==="in").reduce((s,x)=>s+x.value,0),sai=fin.filter(x=>x.type==="out").reduce((s,x)=>s+x.value,0);
  const rows=fin.map(x=>`<tr><td><span class="row" style="gap:8px"><span class="dot ${x.type==='in'?'d-emerald':'d-rose'}"></span>${esc(x.desc)}</span></td><td class="muted">${esc(x.author||"")}</td><td class="muted">${x.date}</td><td class="right" style="font-weight:600;color:${x.type==='in'?'var(--emerald)':'var(--rose)'}">${x.type==='in'?'+':'−'}${BRL(x.value)}</td><td class="right"><button class="iconbtn" style="color:#cbd5e1" data-act="del-finance" data-id="${x.id}">${svg("trash",15)}</button></td></tr>`).join("");
  return `<div class="kpis mb" style="grid-template-columns:repeat(3,1fr)">${kpi("Entradas",BRL(ent))}${kpi("Saídas",BRL(sai))}${kpi("Saldo",BRL(ent-sai))}</div><div class="card"><table><thead><tr><th>Descrição</th><th>Autor</th><th>Data</th><th class="right">Valor</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan="5"><div class="empty">Nenhum lançamento.</div></td></tr>'}</tbody></table></div>`;
}

  const termo=orthoBusca.trim().toLowerCase();
  const members=termo?allMembers.filter(p=>(p.name||"").toLowerCase().includes(termo)||(p.phone||"").toLowerCase().includes(termo)||(p.club.ortodontista||"").toLowerCase().includes(termo)):allMembers;
  const receitaRec=members.filter(m=>m.club.status==="Ativo").reduce((s,m)=>s+(+m.club.mensalidade||0),0);
  const recebidas=members.reduce((s,m)=>s+(m.club.pagamentos||[]).reduce((a,x)=>a+x.value,0),0);
  const atrasadas=members.filter(m=>m.club.status==="Em atraso").reduce((s,m)=>s+(+m.club.mensalidade||0),0);

  return `<div class="between mb"><div><h2 class="h2">OrthoClub</h2><p class="sub">Plano de assinatura · clique no card para abrir a ficha</p></div><button class="btn btn-primary" data-act="new-ortho">${svg("plus",16)} Novo membro</button></div>

    ${termo?`<p class="faint mb" style="font-size:12px;margin-top:-6px">${members.length} resultado(s) para "<b>${esc(orthoBusca)}</b>"${members.length===0?" · nenhum membro encontrado":""}</p>`:""}
    <div class="card pad gold mb"><div class="uppr" style="color:#fff8e1">Receita recorrente OrthoClub</div><div style="font-size:28px;font-weight:700">${BRL(receitaRec)} <span style="font-size:14px;font-weight:500">/mês</span></div><div style="font-size:12px;opacity:.9">${members.length} membros · benefícios usados: ${benUsed}</div></div>
    <div class="kpis mb" style="grid-template-columns:repeat(3,1fr)">${kpi("Membros ativos",members.filter(m=>m.club.status==='Ativo').length)}${kpi("Novos membros",novos)}${kpi("Mensalidades recebidas",BRL(recebidas))}${kpi("Mensalidades atrasadas",BRL(atrasadas))}${kpi("Limpezas pendentes",limpPend)}${kpi("Benefícios utilizados",benUsed)}</div>
    <div class="grid" style="grid-template-columns:repeat(2,1fr)">${cards||'<div class="card"><div class="empty">Nenhum membro no OrthoClub. Use "Novo membro" ou ative o plano na ficha de um paciente.</div></div>'}</div>`;

/* ===== ACTIONS ===== */
function pushHist(p,text,type){(p.history=p.history||[]).unshift({id:uid(),at:stamp(),who:session.name,text,type:type||"log"});}
function pushClub(p,text){(p.club.history=p.club.history||[]).unshift({id:uid(),at:stamp(),text});}

document.addEventListener("click",e=>{
  const t=e.target.closest("[data-act]");if(!t)return;const act=t.dataset.act,id=t.dataset.id;
  switch(act){
    case"login":{const email=$("#lg-email").value.trim(),pw=$("#lg-pass").value;const u=state.users.find(x=>x.email===email&&x.password===pw);const err=$("#lg-err");if(!u){err.style.display="block";err.textContent="E-mail ou senha inválidos.";return;}if(!u.active){err.style.display="block";err.textContent="Usuário inativo.";return;}session=u;view=effectivePerms(u)[0]||"dashboard";render();break;}
    case"logout":session=null;openId=null;render();break;
    case"nav":view=id;openId=null;$(".scrim")?.remove();render();break;
    case"period":period.mode=(id==="custom")?"custom":id;render();break;
    case"goals":if(session.role==="Mentor")goalsModal();break;
    case"save-goals":{if(session.role!=="Mentor"){closeModal();break;}const ym=$("#g-mes").value||new Date().toISOString().slice(0,7);commit(s=>{s.settings.metasMes=s.settings.metasMes||{};s.settings.metasMes[ym]={metaFaturamento:+$("#g-fat").value||0,metaPacientes:+$("#g-pac").value||0,investimento:+$("#g-inv").value||0,custoLead:+$("#g-cl").value||0,custoAgendamento:+$("#g-ca").value||0,custoVenda:+$("#g-cv").value||0};},{action:`Atualizou metas & custos (${ym})`});closeModal();break;}

    case"new-patient":patientModal();break;
    case"save-patient":{const name=$("#np-name").value.trim();if(!name)return;const p=ensurePatient({id:uid(),name,phone:$("#np-phone").value.trim(),origin:$("#np-origin").value,treatment:$("#np-treat").value,owner:$("#np-owner").value,estimate:+$("#np-est").value||0,closedValue:0,stage:"lead",daysIn:0,createdAt:todayISO(),history:[{id:uid(),at:stamp(),who:session.name,text:'Lead criado em "Lead Gerado"',type:"etapa"}]});commit(s=>s.patients.unshift(p),{action:`Criou lead ${name}`});closeModal();break;}
    case"mark-closed":closeDealModal(id);break;
    case"save-close":{const ortho=$("#cd-ortho").checked;
      if(ortho){const mens=+($("#cd-mens")?.value||0);const ades=+($("#cd-adesao")?.value||0);commit(s=>{const p=s.patients.find(x=>x.id===id);if(!p)return;ensurePatient(p);p.stage="fechou";p.closedValue=0;p.daysIn=0;p.closedAt=todayISO();if(p.treatment!=="OrthoClub")p.treatment="OrthoClub";p.club.mensalidade=mens;p.club.adesao=ades;p.club.dataEntrada=p.club.dataEntrada||todayISO();p.club.formaPagamento="Boleto Integrada";setupClubMember(p);if(!(p.club.history||[]).some(h=>/OrthoClub/.test(h.text)))pushClub(p,"Entrou no OrthoClub");pushHist(p,`Fechado no OrthoClub — ${BRL(mens)}/mês · cód ${p.code}`,"close");},{action:`Fechou no OrthoClub — ${BRL(mens)}/mês`});}
      else{const val=+$("#cd-val").value||0;const c={value:val,method:$("#cd-method").value,parcelas:+$("#cd-parc").value||1,entrada:+$("#cd-entrada").value||0,firstDue:$("#cd-first").value||todayISO(),cpf:$("#cd-cpf").value.trim(),responsavelFin:session.name,createdAt:todayISO()};commit(s=>{const p=s.patients.find(x=>x.id===id);if(!p)return;ensurePatient(p);p.stage="fechou";p.closedValue=val;p.daysIn=0;p.closedAt=todayISO();c.servico=p.treatment;c.installments=genInstallments(c);p.contract=c;pushHist(p,`Contrato gerado — ${BRL(val)} em ${c.parcelas}x (${c.method})`,"close");},{action:`Fechou contrato — ${BRL(val)} em ${+$("#cd-parc").value||1}x`});}
      closeModal();render();break;}
    case"fin-tab":finTab=id;render();break;
    case"baixa":{const iid=t.dataset.v;const p0=state.patients.find(x=>x.id===id);const i0=p0&&p0.contract?p0.contract.installments.find(x=>x.id===iid):null;commit(s=>{const p=s.patients.find(x=>x.id===id);if(!p||!p.contract)return;const inst=p.contract.installments.find(x=>x.id===iid);if(!inst)return;inst.status="pago";inst.paidDate=todayISO();inst.baixaBy=session.name;s.finance.unshift({id:uid(),type:"in",date:todayISO(),desc:`Recebimento ${inst.n} — ${p.name}`,value:inst.value,author:session.name});},{action:`Deu baixa: ${i0?i0.n:""} de ${p0?p0.name:""} (${BRL(i0?i0.value:0)})`});break;}
    case"cobrar":{commit(s=>{const p=s.patients.find(x=>x.id===id);if(!p)return;p.contract=p.contract||{};(p.contract.cobrancas=p.contract.cobrancas||[]).unshift({at:stamp(),by:session.name});},{action:`Registrou cobrança — ${state.patients.find(x=>x.id===id)?.name||""}`});break;}
    case"open":openId=id;drawerType="patient";drawerTab="neg";renderActiveDrawer();break;
    case"open-ortho":{const p=state.patients.find(x=>x.id===id);ensurePatient(p);if(!p.club.active){commit(s=>{const q=s.patients.find(x=>x.id===id);setupClubMember(q);q.treatment="OrthoClub";pushClub(q,"Entrou no OrthoClub"+(q.code?" · cód "+q.code:""));},{action:`Ativou OrthoClub para ${p.name}`});}openId=id;drawerType="ortho";drawerTab="ficha";renderActiveDrawer();break;}
    case"dtab":drawerTab=id;renderActiveDrawer();break;
    case"close-drawer":openId=null;drawerType=null;$(".scrim:not(.center)")?.remove();render();break;
    case"set-stage":case"set-owner":break;
    case"drop-lead":commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){p.owner=null;pushHist(p,"Lead solto (volta para a equipe)","etapa");}},{action:"Soltou um lead"});renderActiveDrawer();break;
    case"conclude":requireMaster("término de procedimento",()=>{commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){p.situacao="Procedimento concluído";pushHist(p,"Término de procedimento","clinico");}},{action:"Concluiu procedimento de paciente",critical:true});renderActiveDrawer();});break;
    case"addtag":{const v=$("#tag-input").value.trim();if(!v)return;commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){p.tags=p.tags||[];if(!p.tags.includes(v))p.tags.push(v);pushHist(p,"Etiqueta adicionada: "+v,"tag");}if(!s.tags.includes(v))s.tags.push(v);});renderActiveDrawer();break;}
    case"untag":{const v=t.dataset.v;commit(s=>{const p=s.patients.find(x=>x.id===id);if(p)p.tags=(p.tags||[]).filter(x=>x!==v);});renderActiveDrawer();break;}
    case"add-indicou":{const v=$("#indicou-input").value.trim();if(!v)return;commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){p.indicou=p.indicou||[];if(!p.indicou.includes(v))p.indicou.push(v);}});renderActiveDrawer();break;}
    case"rm-indicou":{const v=t.dataset.v;commit(s=>{const p=s.patients.find(x=>x.id===id);if(p)p.indicou=(p.indicou||[]).filter(x=>x!==v);});renderActiveDrawer();break;}
    case"comment":{const v=$("#cmt-input").value.trim();if(!v)return;commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){(p.comments=p.comments||[]).unshift({id:uid(),at:stamp(),who:session.name,text:v});pushHist(p,"Comentário adicionado","comentario");}});renderActiveDrawer();break;}
    case"del-patient":requireMaster("excluir paciente",()=>{const p=state.patients.find(x=>x.id===id);commit(s=>{s.patients=s.patients.filter(x=>x.id!==id);},{action:`EXCLUIU paciente ${p?p.name:""}`,critical:true});openId=null;$(".scrim:not(.center)")?.remove();render();});break;
    case"add-retorno":retornoModal(id);break;
    case"save-retorno":{const date=$("#rt-date").value,time=$("#rt-time").value,type=$("#rt-type").value;commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){(p.retornos=p.retornos||[]).unshift({id:uid(),date,time,type,at:stamp()});s.events.unshift({id:uid(),date,time,type,patient:p.name,owner:p.owner||session.id});pushHist(p,`${type} agendado para ${fmtDate(date)} ${time}`,"agenda");}});closeModal();renderActiveDrawer();break;}

    /* ortho */
    case"new-ortho":orthoMemberModal();break;
    case"save-ortho-member":{const name=$("#om-name").value.trim();if(!name)return;const p=ensurePatient({id:uid(),name,phone:$("#om-phone").value.trim(),cpf:$("#om-cpf").value.trim(),birthDate:$("#om-birth").value,origin:"Indicação",treatment:"OrthoClub",owner:session.id,estimate:0,closedValue:0,stage:"fechou",daysIn:0,createdAt:todayISO(),history:[{id:uid(),at:stamp(),who:session.name,text:"Membro OrthoClub criado",type:"etapa"}]});p.club.mensalidade=+$("#om-mens").value||0;p.club.adesao=+$("#om-adesao").value||0;p.club.ortodontista=$("#om-orto").value.trim();p.club.dataEntrada=$("#om-data").value||todayISO();p.club.formaPagamento="Boleto Integrada";setupClubMember(p);pushClub(p,"Entrou no OrthoClub");commit(s=>s.patients.unshift(p),{action:`Novo membro OrthoClub: ${name} · cód ${p.code}`});closeModal();break;}
    case"oc-status":commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){p.club.status=t.dataset.v;pushClub(p,"Status alterado para "+t.dataset.v);}});renderActiveDrawer();break;
    case"oc-aparelho":commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){p.club.aparelhoInstalado=!p.club.aparelhoInstalado;pushClub(p,p.club.aparelhoInstalado?"Aparelho instalado":"Aparelho removido");}});renderActiveDrawer();break;
    case"oc-pot":commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){const arr=p.club.potencial;const v=t.dataset.v;const i=arr.indexOf(v);if(i>=0)arr.splice(i,1);else arr.push(v);}});renderActiveDrawer();break;
    case"oc-pay":payModal(id);break;
    case"save-pay":{const date=$("#pay-date").value,val=+$("#pay-val").value||0;commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){(p.club.pagamentos=p.club.pagamentos||[]).unshift({date,value:val});p.club.proxVencimento=addMonths(date,1);pushClub(p,`Pagamento registrado — ${BRL(val)}`);s.finance.unshift({id:uid(),type:"in",date,desc:`Mensalidade OrthoClub — ${p.name}`,value:val,author:session.name});}},{action:`Mensalidade OrthoClub — ${BRL(val)}`});closeModal();renderActiveDrawer();break;}
    case"oc-manut":commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){const d=todayISO();(p.club.manutencoes=p.club.manutencoes||[]).unshift({date:d});p.club.ultimaManutencao=d;p.club.proxManutencao=addMonths(d,1);pushClub(p,"Manutenção registrada");}});renderActiveDrawer();break;
    case"oc-benefit":{const k=t.dataset.v;commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){const b=p.club[k];b.ultima=todayISO();b.uses=(b.uses||0)+1;pushClub(p,(k==="limpeza"?"Limpeza":"Extração")+" utilizada");}},{action:"Benefício OrthoClub utilizado"});renderActiveDrawer();break;}
    case"oc-contato":{const v=$("#contato-input").value.trim();if(!v)return;commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){(p.club.contatos=p.club.contatos||[]).unshift({text:v,at:stamp()});pushClub(p,"Contato registrado: "+v);}});renderActiveDrawer();break;}
    case"oc-baixa":{const iid=t.dataset.v;const p0=state.patients.find(x=>x.id===id);const i0=p0&&p0.club?(p0.club.parcelas||[]).find(x=>x.id===iid):null;commit(s=>{const p=s.patients.find(x=>x.id===id);if(!p||!p.club)return;const inst=(p.club.parcelas||[]).find(x=>x.id===iid);if(!inst)return;inst.status="pago";inst.paidDate=todayISO();inst.baixaBy=session.name;(p.club.pagamentos=p.club.pagamentos||[]).unshift({date:todayISO(),value:inst.value});const nx=(p.club.parcelas||[]).filter(x=>x.status!=="pago").sort((a,b)=>a.due.localeCompare(b.due))[0];p.club.proxVencimento=nx?nx.due:null;pushClub(p,`Recebido ${inst.n} — ${BRL(inst.value)}`);s.finance.unshift({id:uid(),type:"in",date:todayISO(),desc:`OrthoClub ${inst.n} — ${p.name}`,value:inst.value,author:session.name});},{action:`OrthoClub baixa ${i0?i0.n:""} — ${BRL(i0?i0.value:0)}`});renderActiveDrawer();break;}
    case"oc-genparc":commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){ensurePatient(p);p.club.parcelas=genClubParcelas(p.club);const nx=(p.club.parcelas||[]).find(x=>x.status!=="pago");p.club.proxVencimento=nx?nx.due:null;pushClub(p,"Parcelas (12x) geradas");}},{action:"Gerou parcelas OrthoClub (12x)"});renderActiveDrawer();break;

    case"new-event":eventModal();break;
    case"save-event":{const pat=$("#ne-pat").value;if(!pat)return;const ev={id:uid(),date:$("#ne-date").value,time:$("#ne-time").value,type:$("#ne-type").value,patient:pat,owner:$("#ne-owner").value};commit(s=>{s.events.unshift(ev);const p=s.patients.find(x=>x.name===pat);if(p)pushHist(p,`Agendado: ${ev.type} em ${ev.date} ${ev.time}`,"agenda");});closeModal();break;}
    case"new-task":taskModal();break;
    case"save-task":{const title=$("#nt-title").value.trim();if(!title)return;commit(s=>s.tasks.unshift({id:uid(),title,owner:$("#nt-owner").value,due:$("#nt-due").value,status:"aberta",createdBy:session.name,createdAt:stamp(),comments:[]}),{action:`Criou tarefa: ${title}`});closeModal();break;}
    case"toggle-task":{const fromModal=!!$(".scrim.center");commit(s=>{const x=s.tasks.find(t=>t.id===id);if(x)x.status=x.status==="aberta"?"concluída":"aberta";});if(fromModal)taskDetailModal(id);break;}
case"open-task":taskDetailModal(id);break;
case"task-comment":{const v=$("#task-cmt-input").value.trim();if(!v)return;commit(s=>{const tk=s.tasks.find(x=>x.id===id);if(tk)(tk.comments=tk.comments||[]).unshift({id:uid(),at:stamp(),who:session.name,text:v});});taskDetailModal(id);break;}
    case"del-task":requireMaster("excluir tarefa",()=>{const tk=state.tasks.find(x=>x.id===id);commit(s=>{s.tasks=s.tasks.filter(x=>x.id!==id);},{action:`EXCLUIU tarefa: ${tk?tk.title:""}`,critical:true});closeModal();});break;
    case"new-material":if(!canEditMaterials())break;materialModal();break;
    case"save-material":{if(!canEditMaterials())break;const title=$("#nm-title").value.trim(),url=$("#nm-url").value.trim();if(!title||!url)return;commit(s=>s.materials.unshift({id:uid(),title,url,type:$("#nm-type").value,at:stamp()}),{action:`Adicionou material: ${title}`});closeModal();break;}
    case"del-material":if(!canEditMaterials())break;requireMaster("excluir material",()=>{const m=state.materials.find(x=>x.id===id);commit(s=>{s.materials=s.materials.filter(x=>x.id!==id);},{action:`EXCLUIU material: ${m?m.title:""}`,critical:true});});break;
    case"new-finance":financeModal();break;
    case"save-finance":{const desc=$("#nf-desc").value.trim(),val=+$("#nf-val").value;if(!desc||!val)return;commit(s=>s.finance.unshift({id:uid(),type:$("#nf-type").value,date:$("#nf-date").value,desc,value:val,author:session.name}),{action:`Lançamento: ${desc} (${BRL(val)})`});closeModal();break;}
    case"del-finance":requireMaster("excluir lançamento financeiro",()=>{const f=state.finance.find(x=>x.id===id);commit(s=>{s.finance=s.finance.filter(x=>x.id!==id);},{action:`EXCLUIU lançamento: ${f?f.desc:""} (${BRL(f?f.value:0)})`,critical:true});});break;
    case"team-tab":teamTab=id;render();break;
    case"new-user":userModal(null);break;
    case"edit-user":userModal(id);break;
    case"toggle-custom":document.querySelectorAll(".uperm").forEach(c=>c.disabled=!t.checked);break;
    case"save-user":{const name=$("#nu-name").value.trim(),email=$("#nu-email").value.trim();if(!name||!email)return;const custom=$("#nu-custom").checked;const perms=custom?Array.from(document.querySelectorAll(".uperm:checked")).map(c=>c.value):null;const data={name,email,password:$("#nu-pass").value,role:$("#nu-role").value,commission:+$("#nu-comm").value||0,permissions:perms};commit(s=>{if(id){const u=s.users.find(x=>x.id===id);Object.assign(u,data);}else{s.users.unshift({id:uid(),active:true,...data});}},{action:id?`Editou colaborador ${name}`:`Cadastrou colaborador ${name}`});closeModal();break;}
    case"toggle-user":commit(s=>{const u=s.users.find(x=>x.id===id);if(u)u.active=!u.active;});break;
    case"new-role":roleModal(null);break;
    case"edit-role":roleModal(id);break;
    case"save-role":{const name=id||$("#nr-name").value.trim();if(!name)return;const perms=Array.from(document.querySelectorAll(".rperm:checked")).map(c=>c.value);commit(s=>{const builtin=s.roles[name]?s.roles[name].builtin:false;s.roles[name]={permissions:perms,builtin};},{action:id?`Editou cargo ${name}`:`Criou cargo ${name}`});closeModal();break;}
    case"del-role":requireMaster("excluir cargo",()=>{commit(s=>{delete s.roles[id];},{action:`EXCLUIU cargo ${id}`,critical:true});});break;
    case"master-ok":{const pw=$("#master-pw").value;if(pw!==MASTER){$("#master-err").style.display="block";return;}const cb=masterPending;masterPending=null;closeModal();if(cb)cb();break;}
    case"ortho-clear":orthoBusca="";render();break;
    case"close-modal":closeModal();break;
  }
});

/* scrim background click */
document.addEventListener("click",e=>{if(e.target.classList&&e.target.classList.contains("scrim")){if(e.target.classList.contains("center"))closeModal();else{openId=null;drawerType=null;e.target.remove();render();}}});

/* change handlers: generic data-field + stage/owner + period dates */
document.addEventListener("change",e=>{
  if(e.target.id==="cd-ortho"){const on=e.target.checked;const mw=$("#cd-mens-wrap");if(mw)mw.style.display=on?"block":"none";const cw=$("#cd-contract-wrap");if(cw)cw.style.display=on?"none":"block";return;}
  if(e.target.id==="g-mes"){goalsModal(e.target.value);return;}
  const fld=e.target.closest("[data-field]");
  if(fld&&openId){const field=fld.dataset.field;const val=fld.type==="checkbox"?fld.checked:(fld.type==="number"?(+fld.value||0):fld.value);const log=fld.dataset.log;
    commit(s=>{const p=s.patients.find(x=>x.id===openId);if(!p)return;ensurePatient(p);
      if(field==="closedValue"){p.closedValue=val;}
      else setDeep(p,field,val);
      if(log)pushHist(p,log,"edit");
    });renderActiveDrawer();return;}
  const t=e.target.closest("[data-act]");if(!t)return;const id=t.dataset.id;
  if(t.dataset.act==="set-stage"){const v=t.value;commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){const old=stage(p.stage).label;p.stage=v;p.daysIn=0;if(v==="fechou")p.closedAt=todayISO();pushHist(p,`Etapa: ${old} → ${stage(v).label}`,"etapa");if(v==="fechou"&&!p.financeBooked&&(+p.closedValue>0)){p.financeBooked=true;s.finance.unshift({id:uid(),type:"in",date:todayISO(),desc:`Fechamento — ${p.name} (${p.treatment})`,value:+p.closedValue,author:session.name});}}},{action:`Moveu paciente para ${stage(v).label}`});renderActiveDrawer();}
  if(t.dataset.act==="set-owner"){const v=t.value;commit(s=>{const p=s.patients.find(x=>x.id===id);if(p){p.owner=v||null;pushHist(p,v?"Responsável alterado":"Lead solto (volta para a equipe)","etapa");}},{action:"Alterou responsável"});renderActiveDrawer();}
  if(t.dataset.act==="period-date"){period.from=$("#pf-from")?.value||period.from;period.to=$("#pf-to")?.value||period.to;render();}
  if(t.dataset.act==="ortho-search"){const v=t.value;orthoBusca=v;const cards=document.querySelectorAll('[data-act="open-ortho"]');render();const inp=$("#ortho-busca");if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}}
});

/* drag & drop */
let dragId=null;
document.addEventListener("dragstart",e=>{const c=e.target.closest("[data-drag]");if(c){dragId=c.dataset.drag;e.dataTransfer.effectAllowed="move";}});
document.addEventListener("dragover",e=>{const d=e.target.closest(".drop");if(d){e.preventDefault();d.classList.add("over");}});
document.addEventListener("dragleave",e=>{const d=e.target.closest(".drop");if(d)d.classList.remove("over");});
document.addEventListener("drop",e=>{const d=e.target.closest("[data-drop]");if(!d||!dragId)return;e.preventDefault();const sid=d.dataset.drop,pid=dragId;dragId=null;commit(s=>{const p=s.patients.find(x=>x.id===pid);if(p&&p.stage!==sid){const old=stage(p.stage).label;p.stage=sid;p.daysIn=0;if(sid==="fechou")p.closedAt=todayISO();pushHist(p,`Etapa: ${old} → ${stage(sid).label}`,"etapa");if(sid==="fechou"&&!p.financeBooked&&(+p.closedValue>0)){p.financeBooked=true;s.finance.unshift({id:uid(),type:"in",date:todayISO(),desc:`Fechamento — ${p.name} (${p.treatment})`,value:+p.closedValue,author:session.name});}}},{action:`Moveu paciente para ${stage(sid).label}`});});

/* keyboard */
document.addEventListener("keydown",e=>{if(e.key!=="Enter")return;const id=e.target.id;if($("#lg-email")&&(id==="lg-email"||id==="lg-pass"))document.querySelector('[data-act="login"]').click();if(id==="cmt-input")document.querySelector('[data-act="comment"]')?.click();if(id==="tag-input")document.querySelector('[data-act="addtag"]')?.click();if(id==="indicou-input")document.querySelector('[data-act="add-indicou"]')?.click();if(id==="contato-input")document.querySelector('[data-act="oc-contato"]')?.click();if(id==="task-cmt-input")document.querySelector('[data-act="task-comment"]')?.click();if(id==="master-pw")document.querySelector('[data-act="master-ok"]')?.click();});
window.addEventListener("online",()=>setSync("saved"));window.addEventListener("offline",()=>setSync("offline"));
(async function boot(){if(USE_FIREBASE){try{await initFirebase();}catch(e){console.error("Firebase falhou, usando localStorage",e);}}render();})();
</script>
</body>
</html>
